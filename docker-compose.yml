version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=kuja-grant-secret-2026
      - DATABASE_URL=postgresql://kuja:kujapass@db:5432/kuja_grant
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - FLASK_ENV=production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=kuja
      - POSTGRES_PASSWORD=kujapass
      - POSTGRES_DB=kuja_grant
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuja"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  uploads:
