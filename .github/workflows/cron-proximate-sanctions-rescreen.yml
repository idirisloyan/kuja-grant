name: Weekly Proximate sanctions re-screen cron

# Phase 690 — Weekly re-screen of every dd_clear partner against
# sanctions lists. Catches partners who were cleared weeks ago but
# now show up on a newly-added list. Emits a single audit row per
# partner that flips clean->flagged so the OB has one signal to act
# on. Internal rate-limit (6-day grace) makes it safe to run more
# often than weekly without re-screening churn.
#
# Required repo secrets:
#   CRON_SECRET — must match the CRON_SECRET set on Railway
#   PROD_BASE   — optional override of the base URL

on:
  # Every Monday at 03:00 UTC (off-peak in East Africa)
  schedule:
    - cron: "0 3 * * 1"

  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Determine base URL
        id: base
        run: |
          if [ -n "${{ secrets.PROD_BASE }}" ]; then
            echo "url=${{ secrets.PROD_BASE }}" >> $GITHUB_OUTPUT
          else
            echo "url=https://web-production-6f8a.up.railway.app" >> $GITHUB_OUTPUT
          fi

      - name: POST /api/proximate/monitoring/sanctions-rescreen
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: ${{ steps.base.outputs.url }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET repo secret is missing — add it under Settings → Secrets and variables → Actions, matching the Railway env var."
            exit 1
          fi
          http_code=$(curl -s -o /tmp/body.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${BASE_URL}/api/proximate/monitoring/sanctions-rescreen")
          echo "HTTP ${http_code}"
          cat /tmp/body.json || true
          if [ "${http_code}" != "200" ]; then
            echo "::error::Proximate sanctions-rescreen cron returned ${http_code}"
            exit 1
          fi

      - name: Summarise run output
        if: always()
        run: |
          if [ -f /tmp/body.json ]; then
            python3 - <<'PY'
          import json, os
          with open('/tmp/body.json') as f:
              try:
                  d = json.load(f)
              except Exception:
                  print('Cron returned non-JSON body')
                  raise SystemExit(0)
          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if not summary:
              print(json.dumps(d, indent=2))
              raise SystemExit(0)
          with open(summary, 'a') as out:
              out.write('# Proximate sanctions-rescreen cron\n\n')
              out.write(f'- **Rescreened**: {d.get("rescreened")}\n')
              out.write(f'- **Newly flagged**: {d.get("newly_flagged")}\n')
              out.write(f'- **Skipped (recent)**: {d.get("skipped_recent")}\n')
          PY
          fi
