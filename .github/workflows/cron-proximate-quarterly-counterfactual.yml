name: Quarterly Proximate counterfactual prompt cron

# Phase 685 — Asks every partner who attested a 90-day outcome
# but hasn't yet reflected on the counterfactual ("what would
# have happened without this disbursement?") to do so this quarter.
# Emits one audit row per attestation per quarter (dedup by quarter
# key in the audit chain).
#
# Required repo secrets:
#   CRON_SECRET — must match the CRON_SECRET set on Railway
#   PROD_BASE   — optional override of the base URL

on:
  # First day of each quarter at 05:00 UTC — Jan 1, Apr 1, Jul 1, Oct 1
  schedule:
    - cron: "0 5 1 1,4,7,10 *"

  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Determine base URL
        id: base
        run: |
          if [ -n "${{ secrets.PROD_BASE }}" ]; then
            echo "url=${{ secrets.PROD_BASE }}" >> $GITHUB_OUTPUT
          else
            echo "url=https://web-production-6f8a.up.railway.app" >> $GITHUB_OUTPUT
          fi

      - name: POST /api/proximate/monitoring/quarterly-counterfactual-prompt
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: ${{ steps.base.outputs.url }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET repo secret is missing — add it under Settings → Secrets and variables → Actions, matching the Railway env var."
            exit 1
          fi
          http_code=$(curl -s -o /tmp/body.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${BASE_URL}/api/proximate/monitoring/quarterly-counterfactual-prompt")
          echo "HTTP ${http_code}"
          cat /tmp/body.json || true
          if [ "${http_code}" != "200" ]; then
            echo "::error::Proximate quarterly counterfactual prompt cron returned ${http_code}"
            exit 1
          fi

      - name: Summarise run output
        if: always()
        run: |
          if [ -f /tmp/body.json ]; then
            python3 - <<'PY'
          import json, os
          with open('/tmp/body.json') as f:
              try:
                  d = json.load(f)
              except Exception:
                  print('Cron returned non-JSON body')
                  raise SystemExit(0)
          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if not summary:
              print(json.dumps(d, indent=2))
              raise SystemExit(0)
          with open(summary, 'a') as out:
              out.write('# Proximate quarterly counterfactual cron\n\n')
              out.write(f'- **Quarter**: {d.get("quarter")}\n')
              out.write(f'- **Attestations nudged**: {d.get("nudged")}\n')
          PY
          fi
