name: Weekly Proximate sanctions intervention sweep cron

# Wave 4 — Completes the sanctions loop. `sanctions-rescreen` finds
# partners who newly appear on a list; this sweep makes sure every one
# of those hits actually has an open intervention attached, and opens
# one where it does not.
#
# The two are deliberately separate jobs rather than one: a re-screen
# that partially fails should not also mean interventions silently go
# unopened, and this sweep is idempotent, so re-running it is always
# safe.
#
# Scheduled AFTER the Monday 03:00 re-screen so it acts on the same
# morning's findings rather than last week's.
#
# Required repo secrets:
#   CRON_SECRET — must match the CRON_SECRET set on Railway
#   PROD_BASE   — optional override of the base URL

on:
  # Every Monday at 04:00 UTC — one hour after sanctions-rescreen.
  schedule:
    - cron: "0 4 * * 1"

  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Determine base URL
        id: base
        run: |
          if [ -n "${{ secrets.PROD_BASE }}" ]; then
            echo "url=${{ secrets.PROD_BASE }}" >> $GITHUB_OUTPUT
          else
            echo "url=https://web-production-6f8a.up.railway.app" >> $GITHUB_OUTPUT
          fi

      - name: POST /api/proximate-ops/sanctions/sweep-interventions
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: ${{ steps.base.outputs.url }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET repo secret is missing — add it under Settings → Secrets and variables → Actions, matching the Railway env var."
            exit 1
          fi
          http_code=$(curl -s -o /tmp/body.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${BASE_URL}/api/proximate-ops/sanctions/sweep-interventions")
          echo "HTTP ${http_code}"
          cat /tmp/body.json || true
          if [ "${http_code}" != "200" ]; then
            echo "::error::Proximate sanctions sweep cron returned ${http_code}"
            exit 1
          fi

      - name: Summarise run output
        if: always()
        run: |
          if [ -f /tmp/body.json ]; then
            python3 - <<'PY'
          import json, os
          with open('/tmp/body.json') as f:
              try:
                  d = json.load(f)
              except Exception:
                  print('Cron returned non-JSON body')
                  raise SystemExit(0)
          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if not summary:
              print(json.dumps(d, indent=2))
              raise SystemExit(0)
          with open(summary, 'a') as out:
              # The endpoint nests its payload under `result`.
              r = d.get('result') or {}
              out.write('# Proximate sanctions intervention sweep\n\n')
              out.write(f'- **Flagged partners considered**: {r.get("considered")}\n')
              out.write(f'- **Interventions opened**: {r.get("opened")}\n')
              out.write(f'- **Skipped (already covered)**: {r.get("skipped")}\n')
          PY
          fi
